spring:
  application:
    name: deck-assemble-api
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:deckassemble}
    username: ${DB_USERNAME:deckassemble}
    password: ${DB_PASSWORD:deckassemble}
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
  liquibase:
    change-log: classpath:/db/changelog/db.changelog-master.yaml
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${AUTH0_ISSUER_URI:}
          audiences: ${AUTH0_AUDIENCE:}

server:
  servlet:
    context-path: /api/v1

logging:
  level:
    com.deckassemble: INFO

deckassemble:
  scryfall:
    base-url: ${SCRYFALL_BASE_URL:https://api.scryfall.com}
    user-agent: ${SCRYFALL_USER_AGENT:DeckAssemble/0.0.1}
    connect-timeout: 5s
    read-timeout: 30s
    request-delay: 100ms
