databaseChangeLog:
  - changeSet:
      id: 001-create-application-settings
      author: sisyphus
      changes:
        - createTable:
            tableName: application_settings
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: setting_key
                  type: varchar(255)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: setting_value
                  type: text
              - column:
                  name: description
                  type: varchar(500)
              - column:
                  name: created_at
                  type: timestamptz
                  defaultValueComputed: now()
                  constraints:
                    nullable: false
              - column:
                  name: created_by
                  type: varchar(255)
              - column:
                  name: updated_at
                  type: timestamptz
              - column:
                  name: updated_by
                  type: varchar(255)
        - rollback:
            - dropTable:
                tableName: application_settings
