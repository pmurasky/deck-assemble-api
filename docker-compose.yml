services:
  postgres:
    image: postgres:17-alpine
    container_name: deck-assemble-postgres
    environment:
      POSTGRES_DB: deckassemble
      POSTGRES_USER: deckassemble
      POSTGRES_PASSWORD: deckassemble
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
